name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DATABASE_URL: "postgresql://vetlog:vetlog@localhost:5432/vetlog?schema=public"
  ACCESS_TOKEN_SECRET: "ci-access-token-secret-not-for-production-use"
  REFRESH_TOKEN_SECRET: "ci-refresh-token-secret-not-for-production-use"
  CORS_ORIGIN: "http://localhost:5173"
  CLINIC_TIMEZONE: "Asia/Kolkata"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vetlog/api run db:generate
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vetlog
          POSTGRES_PASSWORD: vetlog
          POSTGRES_DB: vetlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vetlog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vetlog/api run db:generate
      - run: pnpm --filter @vetlog/api exec prisma migrate deploy
      - run: pnpm --filter @vetlog/api run db:seed
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vetlog
          POSTGRES_PASSWORD: vetlog
          POSTGRES_DB: vetlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vetlog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vetlog/api run db:generate
      - run: pnpm --filter @vetlog/api exec prisma migrate deploy
      - run: pnpm --filter @vetlog/api run db:seed
      - run: pnpm --filter @vetlog/web exec playwright install --with-deps chromium
      - run: pnpm --filter @vetlog/web run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
