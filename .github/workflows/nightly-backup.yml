name: Nightly Backup

# Medical data — backups are non-negotiable (CLAUDE.md). Dumps the production
# Postgres DB and uploads it to Cloudflare R2 (same free-tier bucket used for
# case photos). Runs nightly plus on-demand via workflow_dispatch.
on:
  schedule:
    - cron: "30 19 * * *" # ~01:00 IST (Asia/Kolkata, UTC+5:30)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pg_dump "$DATABASE_URL" --format=custom --file=vetlog-backup.dump

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          timestamp="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          aws s3 cp vetlog-backup.dump \
            "s3://${R2_BUCKET_NAME}/backups/vetlog-${timestamp}.dump" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Remove local dump
        if: always()
        run: rm -f vetlog-backup.dump
