services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vetlog
      POSTGRES_PASSWORD: vetlog
      POSTGRES_DB: vetlog
    ports:
      - "5433:5432"
    volumes:
      - vetlog_postgres_data:/var/lib/postgresql/data

volumes:
  vetlog_postgres_data:
